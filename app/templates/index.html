    <div id="severity_modal" class="modal">
        <!-- Modal content -->

        </div>

    <div id="result_modal" class="modal">
        <!-- Modal content -->
        <div class="modal-content">
            <span class="close">&times;</span>
            <p>
                The recommended injury severity is: <span id="severity-result"></span>.<br />
                Reason: <br /><span id="reason-result"></span><br />
                Indicators: <br /><span id="indicators-result"></span><br />
            </p>
        </div>
    </div>



    <script>
        let image_side_flag = true; // true = front, false = back
        let injury_list = [];

        const img = document.getElementById('human_image');
        const canvas = document.getElementById('overlay-canvas');

        const allAreas = document.querySelectorAll('map area');
        allAreas.forEach((area) => {
            area.dataset.originalCoords = area.coords;
        });

        const resizeMapAndCanvas = () => {
            if (!img.naturalWidth) return;

            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;

            const scaleX = img.clientWidth / img.naturalWidth;
            const scaleY = img.clientHeight / img.naturalHeight;

            allAreas.forEach((area) => {
                const coords = area.dataset.originalCoords.split(',').map(Number);
                const scaledCoords = coords.map((coord, i) => {
                    return i % 2 === 0 ? Math.round(coord * scaleX) : Math.round(coord * scaleY);
                });

                area.coords = scaledCoords.join(',');
            });

            drawHighlights();
        };

        window.addEventListener('resize', resizeMapAndCanvas);

        if (img.complete) {
            resizeMapAndCanvas();
        } else {
            img.addEventListener('load', resizeMapAndCanvas);
        }

        const drawHighlights = (severity = "") => {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            console.log("draw", severity, typeof severity)

            const activeMapName = img.getAttribute('usemap').replace('#', '');
            const activeMap = document.querySelector(`map[name="${activeMapName}"]`);

            injury_list.forEach(item => {
                const area = activeMap.querySelector(`area[title="${item.part}"]`);
                if (!area) return;

                switch (item.severity) {
                    case "LIGHT":
                        ctx.fillStyle = 'rgba(0, 200, 0, 0.5)'; // (Green)
                        break;
                    case "MODERATE":
                        ctx.fillStyle = 'rgba(255, 255, 0, 0.5)'; // (Yellow)
                        break;
                    case "SERIOUS":
                        ctx.fillStyle = 'rgba(255, 140, 0, 0.5)'; // (Orange)
                        break;
                    case "SEVERE":
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'; // (Red)
                        break;
                    case "CRITICAL":
                        ctx.fillStyle = 'rgba(139, 0, 0, 0.5)'; // (Dark Red)
                        break;
                    case "UNSURVIVEABLE":
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; // (Black)
                        break;
                    default:
                        ctx.fillStyle = 'rgba(128, 128, 128, 0.5)'; // (Gray)
                }

                const coords = area.coords.split(',').map(Number);
                const shape = area.shape.toLowerCase();

                ctx.beginPath();

                if (shape === 'poly') {
                    ctx.moveTo(coords[0], coords[1]);
                    for (let i = 2; i < coords.length; i += 2) {
                        ctx.lineTo(coords[i], coords[i + 1]);
                    }
                } else if (shape === 'rect') {
                    const [x1, y1, x2, y2] = coords;
                    ctx.rect(x1, y1, x2 - x1, y2 - y1);
                } else if (shape === 'circle') {
                    const [x, y, radius] = coords;
                    ctx.arc(x, y, radius, 0, 2 * Math.PI);
                }

                ctx.fill();
            });
        };

        const change_image_side = () => {
            image_side_flag = !image_side_flag;
            img.src = image_side_flag ? "static/images/front.png" : "static/images/back.png";
            img.setAttribute("usemap", image_side_flag ? "#body-map-front" : "#body-map-back");
        };

        const handle_modal = (type) => {
            return new Promise((resolve) => {
                let modal = document.getElementById(`${type}_modal`);

                modal.style.display = "block";

                if (type === "severity") {
                    let submit = document.getElementById("severity_submit");

                    submit.onclick = () => {
                        let val = parseInt(document.getElementById("select").value);
                        modal.style.display = "none"
                        switch (val) {
                            case 1: resolve("LIGHT"); break;
                            case 2: resolve("MODERATE"); break;
                            case 3: resolve("SERIOUS"); break;
                            case 4: resolve("SEVERE"); break;
                            case 5: resolve("CRITICAL"); break;
                            case 6: resolve("UNSURVIVEABLE"); break;
                        }
                    };
                }

                const closeModal = () => {
                    modal.style.display = "none";
                    resolve("");
                };

                document.getElementsByClassName("close")[0].onclick = closeModal;
                window.onclick = (event) => {
                    if (event.target === modal) {
                        closeModal()
                    }
                }
            })
        }

        const add_injury = async (location) => {
            let severity = -1;
            if (event) event.preventDefault();

            const index = injury_list.findIndex(item => item.part === location);
            if (index > -1) {
                injury_list.splice(index, 1);
                return;
            }
            else {
                document.getElementById('injury-part').innerText = location.replaceAll('-', ' ');
                severity = await handle_modal("severity")
                console.log(severity)
                if (severity === "") return
                injury_list.push({ "part": location, "severity": severity });
            }
            drawHighlights(severity);
        };

        const handle_completed = async () => {
            if (injury_list.length === 0) return;

            let msg = "The patient has been diagnosed with ";

            injury_list.forEach((item) => {
                msg += `${item.severity.toLowerCase()} ${item.part} injury, `
            })

            console.log(msg)

            const setOutput = (fullText) => {
                severity_element = document.getElementById('severity-result');
                justification_element = document.getElementById('reason-result');
                indicators_element = document.getElementById('indicators-result');

                severity_element.innerText = "Processing...";
                justification_element.innerText = "";
                indicators_element.innerText = "";

                const rankStart = fullText.indexOf('"Rank":');
                if (rankStart !== -1) {
                    const rankStr = fullText.substring(rankStart + 7).split(/[,}\n]/)[0].replace(/["\s]/g, '');
                    if (rankStr) severity_element.innerText = rankStr;
                }

                const justStart = fullText.indexOf('"Justification":');
                const indStart = fullText.indexOf('"Key_Medical_Indicators":');
                
                if (justStart !== -1) {
                    let endIdx = indStart !== -1 ? indStart : fullText.length;
                    let justStr = fullText.substring(justStart + 16, endIdx)
                        .replace(/^[\s"\[]+/, '')
                        .replace(/["\s,\]}]+$/, '')
                        .replace(/\\n/g, '\n');
                    justification_element.innerText = justStr;
                }

                if (indStart !== -1) {
                    let indStr = fullText.substring(indStart + 25)
                        .replace(/^[\s"\[]+/, '')
                        .replace(/["\s,\]}]+$/, '')
                        .replace(/",\s*"/g, ', '); // הפיכת מערך לרשימה פסיק-רווח
                    indicators_element.innerText = indStr;
                }

                // const rankMatch = fullText.match(/"Rank"\s*:\s*"?([^",}]*)/);
                // if (rankMatch && rankMatch[1]) {
                //     severity_element.innerText = rankMatch[1].replace(/"/g, '').trim();
                // }

                // const jMatch = fullText.match(/"Justification"\s*:\s*([\s\S]*?)(?=\s*,\s*"[a-zA-Z_]+"\s*:|$)/);
                // if (jMatch && jMatch[1]) {
                //     // מונע גלישה לאובייקט JSON הבא במקרה של הזיות (חותך בשילוב של } ו- { )
                //     let rawJ = jMatch[1].split(/\}\s*\{/)[0]; 
                    
                //     let cleanJ = rawJ
                //         .replace(/^[\s"\[]+/, '') // ניקוי תחילת המחרוזת
                //         .replace(/["\]\s}]+$/, '') // ניקוי סוף המחרוזת
                //         .replace(/",\s*"/g, '\n') // אם זה מערך - הפיכת פסיקים לירידת שורה
                //         .replace(/\\n/g, '\n')    
                //         .replace(/\\"/g, '"');    
                //     justification_element.innerText = cleanJ.trim();
                // }

                // const iMatch = fullText.match(/"Key_Medical_Indicators"\s*:\s*([\s\S]*)/);
                // if (iMatch && iMatch[1]) {
                //     // קסם החיתוך: מחלק את הטקסט ברגע שהוא מזהה ] או } ולוקח רק את החלק הראשון והנקי!
                //     let rawI = iMatch[1].split(/\]|\}/)[0];
                    
                //     let cleanI = rawI
                //         .replace(/^[\s"\[]+/, '') 
                //         .replace(/["\s]+$/, '') 
                //         .replace(/",\s*"/g, ', ') // אם זה מערך - הפיכה לפסיק ורווח
                //         .replace(/\\"/g, '"');
                        
                //     indicators_element.innerText = cleanI.trim();
                // }
            }


            try {
                const response = await fetch('/query',
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(msg)
                    });
                if (!response.ok) {
                    throw new Error(`Response status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";
                handle_modal("result");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    console.log(fullText)
                    requestAnimationFrame(()=>setOutput(fullText));
                    
                }
            }
            catch (error) {
                console.error(error.message);
            }
        }
    </script>
